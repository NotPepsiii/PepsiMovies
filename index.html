<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PepsiMovies</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- PROFILE SCREEN -->
<div id="profileScreen" class="profile-screen">
  <h1>Who’s watching?</h1>
  <div class="profiles">
    <button onclick="selectProfile('User 1')">User 1</button>
    <button onclick="selectProfile('Guest')">Guest</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <header class="top-nav">
    <h1 class="logo">PepsiMovies</h1>

    <div class="nav-right">
      <span id="profileName"></span>

      <div class="search-box">
        <input id="searchInput" placeholder="Search movies..." />
        <button id="searchBtn">Search</button>
      </div>
    </div>
  </header>

  <main>

    <section class="hero">
      <iframe id="player"></iframe>
      <div id="playerStatus"></div>
    </section>

    <section class="category" id="continueSection">
      <h2>Continue Watching</h2>
      <div id="continueRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Popular</h2>
      <div id="popularRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Top Rated</h2>
      <div id="topRatedRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Action</h2>
      <div id="actionRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Horror</h2>
      <div id="horrorRow" class="row"></div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
