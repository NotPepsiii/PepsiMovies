<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PepsiMovies</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-nav">
    <div class="left">
      <h1 class="logo">PepsiMovies</h1>
    </div>

    <div class="right">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search movies..." />
        <button id="searchBtn">Search</button>
      </div>
    </div>
  </header>

  <main>

    <section class="player-section">
      <iframe id="player" allowfullscreen frameborder="0"></iframe>
      <div id="playerStatus" class="player-status"></div>
    </section>

    <section class="category" id="searchSection" style="display:none;">
      <h2>Search Results</h2>
      <div id="searchRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Popular Movies</h2>
      <div id="popularRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Top Rated</h2>
      <div id="topRatedRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Action</h2>
      <div id="actionRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Horror</h2>
      <div id="horrorRow" class="row"></div>
    </section>

    <section class="category">
      <h2>Comedy</h2>
      <div id="comedyRow" class="row"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
