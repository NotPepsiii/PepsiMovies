<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PepFlick</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>PepFlick</h1>

    <input id="searchInput" type="text" placeholder="Search for a movie...">
    <button id="searchBtn">Search</button>

    <!-- INFO BUTTON -->
    <button id="infoBtn" class="info-btn">i</button>

    <!-- SUPPORT BUTTON -->
    <a class="support-btn" href="https://paypal.me/pepcolaa" target="_blank">
      Support Developer Pepsi &lt;3
    </a>
  </header>

  <main>
    <section class="left">
      <h2 id="sectionTitle">Popular Movies</h2>

      <!-- MOVIE ROW -->
      <div id="movies" class="movie-row"></div>
    </section>

    <section class="right">
      <h2>Player</h2>

      <iframe
        id="player"
        width="100%"
        height="500"
        allowfullscreen
        frameborder="0">
      </iframe>
    </section>
  </main>

  <!-- INFO MODAL -->
  <div id="infoModal" class="modal hidden">
    <div class="modal-content">
      <h2>About PepFlick</h2>

      <p>
        PepFlick is a lightweight movie discovery platform using TMDB data and external embeds.
      </p>

      <p>
        ⚠️ An ad blocker is recommended to avoid popups from some external sources.
      </p>

      <p>
        Built for personal and educational use.
      </p>

      <button id="closeModal">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
